services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: apps/api
    environment:
      CONTOURSCAN_STORAGE: local
    ports:
      - "8000:8000"
    volumes:
      - contourscan-data:/app/data

volumes:
  contourscan-data:
